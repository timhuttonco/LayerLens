<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Layer Lens</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <!-- ── Header ─────────────────────────────────────────────────────────────── -->
  <div class="header">
    <svg class="logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
    </svg>
    <span>Layer Lens</span>
  </div>

  <!-- ── Event counts ───────────────────────────────────────────────────────── -->
  <div class="counts" id="counts" aria-live="polite">
    <div class="count-card">
      <span class="count-num" id="dl-count">–</span>
      <span class="count-label">dataLayer pushes</span>
    </div>
    <div class="count-divider"></div>
    <div class="count-card">
      <span class="count-num" id="ga4-count">–</span>
      <span class="count-label">GA4 events captured</span>
    </div>
  </div>

  <!-- ── Tab bar ────────────────────────────────────────────────────────────── -->
  <div class="tab-bar" role="tablist">
    <button class="tab active" id="tab-events-btn" role="tab"
            aria-selected="true" aria-controls="panel-events">Events</button>
    <button class="tab" id="tab-email-btn" role="tab"
            aria-selected="false" aria-controls="panel-email">Email Check</button>
  </div>

  <!-- ── Events panel ───────────────────────────────────────────────────────── -->
  <div id="panel-events" class="tab-panel" role="tabpanel">

    <div class="search-row">
      <input type="text" id="search-input" placeholder="Search term…"
             autocomplete="off" spellcheck="false" aria-label="Search term" />
      <button id="search-btn" class="btn-primary" aria-label="Run search">Search</button>
    </div>

    <div class="sources-row" role="group" aria-label="Sources to search">
      <label class="checkbox-label">
        <input type="checkbox" id="chk-dl" checked>
        <span>DataLayer</span>
      </label>
      <label class="checkbox-label">
        <input type="checkbox" id="chk-ga4" checked>
        <span>GA4 Events</span>
      </label>
    </div>

    <div class="settings-row">
      <label class="toggle-row" for="chk-tooltip">
        <span class="toggle-text">
          <span class="toggle-title">Hover-to-search tooltip</span>
          <span class="toggle-desc">Show a "Search" button when you select text on the page</span>
        </span>
        <span class="toggle-switch">
          <input type="checkbox" id="chk-tooltip" checked role="switch"
                 aria-label="Enable hover-to-search tooltip">
          <span class="toggle-track"></span>
        </span>
      </label>
    </div>

    <div id="status" class="status hidden" role="status" aria-live="polite"></div>
    <div id="results" class="results" aria-live="polite"></div>

  </div>

  <!-- ── Email PII panel ────────────────────────────────────────────────────── -->
  <div id="panel-email" class="tab-panel" hidden role="tabpanel">

    <div class="search-row">
      <input type="email" id="pii-email" placeholder="user@example.com"
             autocomplete="off" spellcheck="false" aria-label="Email address to check" />
      <button id="pii-btn" class="btn-primary" aria-label="Run email PII check">Check</button>
    </div>

    <div class="sources-row" role="group" aria-label="Sources to check">
      <label class="checkbox-label">
        <input type="checkbox" id="chk-pii-dl" checked>
        <span>DataLayer</span>
      </label>
      <label class="checkbox-label">
        <input type="checkbox" id="chk-pii-ga4" checked>
        <span>GA4 Events</span>
      </label>
    </div>

    <div id="pii-status" class="status hidden" role="status" aria-live="polite"></div>
    <div id="pii-results" class="results" aria-live="polite"></div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
